# Developer instructions for the chatbot project (EXAMPLE)

instructions:
  - "Read .sage/developer/codebase_overview.md for module boundaries (sage/chat, sage/llm, sage/memory, sage/web)."
  - "Read .sage/developer/conventions.md for code style, error handling, and Flask route patterns."
  - "Flask routes live in sage/web/routes.py. Never put business logic in routes -- delegate to sage/chat or sage/memory."
  - "LLM provider abstractions live in sage/llm/. Add new providers as subclasses, don't branch in callers."
  - "Memory/persistence code is in sage/memory/. Profile, session, and vault each have their own module -- keep concerns separated."
  - "When in doubt about where a new module goes, consult .sage/developer/codebase_overview.md before creating files."

  # ---------------------------------------------------------------------------
  # Project-specific gates for the AC implementation map sidecar
  # (the Developer must include these in STORY-N.implementation.md before
  # claiming COMPLETE; failing to do so will be caught by verify_ac_map.py
  # at the Tester's Gate B and bounce the story back to IN_DEV)
  # ---------------------------------------------------------------------------
  - "For any AC mentioning a Flask route, endpoint, or URL path, the AC's section in STORY-N.implementation.md MUST list the route handler function AND a grep result confirming the route is registered (e.g., a line in sage/web/routes.py wiring the path to the handler). A handler defined in isolation with no @app.route or url_map entry does NOT satisfy a route AC."
  - "For any AC mentioning a UI surface (template, page, partial), the AC's section in STORY-N.implementation.md MUST list the template file AND the route/view that renders it. A template that no route renders does NOT satisfy a UI AC."

  # ANDROID PROJECT EXAMPLE (uncomment / adapt for an Android Compose project):
  # - "For any AC mentioning a Compose surface (bottom sheet, dialog, screen, modal), the AC's section in STORY-N.implementation.md MUST list both the @Composable function AND at least one call site in the navigation graph or parent screen. A composable file with zero call sites does NOT satisfy a Compose AC. If you can't find a call site for a composable you wrote, you haven't wired it -- escalate before flipping to TESTING."
