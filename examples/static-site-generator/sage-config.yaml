# Sage Feature Team config for static-site-generator
# Generated by setup_project.py

project:
  name: "static-site-generator"
  root_dir: "."
  absolute_root_dir: 'C:\Users\merri\claudeProjects\sage-feature-team\examples\static-site-generator'

team:
  name: "static-site-generator-feature-team"
  dev_test_team_name: "static-site-generator-dev-test-team"
  agents:
    full:
      - name: "ProductOwner"
        file: "agents/product-owner.md"
      - name: "TestCreator"
        file: "agents/test-creator.md"
      - name: "Developer"
        file: "agents/developer.md"
      - name: "Tester"
        file: "agents/tester.md"
      - name: "EpicVerifier"
        file: "agents/epic-verifier.md"
    dev_test_only:
      - name: "Developer"
        file: "agents/developer.md"
      - name: "Tester"
        file: "agents/tester.md"

paths:
  output_dir: "_output"
  # sage_dir defaults to <absolute_root_dir>/.sage if omitted
  # sage_dir: ".sage"

limits:
  max_cycles: 5                # per-story dev<->test cycle cap
  max_parallel_workers: 4      # concurrent ephemeral worker cap (parallel scheduler)
  global_timeout_seconds: 3600 # wall-clock kill switch for full-mode feature runs
