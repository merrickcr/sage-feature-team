# Sage Feature Team config for the bundled static-site-generator example.
#
# This is the demo "driver" config used when you run /sage-feature-team from
# the sage-feature-team repo root (e.g. the README Quickstart). It points at
# the self-contained example bundled in this repo:
#   examples/static-site-generator/
# The example's per-agent HOW instructions live in its own .sage/ directory,
# which we reference via paths.sage_dir below.

project:
  name: "static-site-generator"
  root_dir: "."
  # absolute_root_dir is intentionally omitted in this demo driver config.
  # In a real installed project, setup_project.py writes an absolute path here
  # so the loader can resolve .sage/ regardless of cwd. For this bundled
  # example, root_dir + sage_dir (below) are enough.

team:
  name: "static-site-generator-feature-team"
  dev_test_team_name: "static-site-generator-dev-test-team"
  agents:
    full:
      - name: "ProductOwner"
        file: "agents/product-owner.md"
      - name: "TestCreator"
        file: "agents/test-creator.md"
      - name: "Developer"
        file: "agents/developer.md"
      - name: "Tester"
        file: "agents/tester.md"
      - name: "EpicVerifier"
        file: "agents/epic-verifier.md"
    dev_test_only:
      - name: "Developer"
        file: "agents/developer.md"
      - name: "Tester"
        file: "agents/tester.md"

paths:
  output_dir: "_output"
  # Point at the bundled example's .sage/ so the loader reads its real
  # per-agent instruction configs. Run from the repo root, the agent role
  # files still resolve against this repo's top-level agents/ directory.
  sage_dir: "examples/static-site-generator/.sage"

limits:
  max_cycles: 5                # per-story dev<->test cycle cap
  max_parallel_workers: 4      # concurrent ephemeral worker cap (parallel scheduler)
  global_timeout_seconds: 3600 # wall-clock kill switch for full-mode feature runs
